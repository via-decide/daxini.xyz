# /usr/local/etc/nginx/servers/zayvora.conf (Research OS Configuration)

limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name api.daxini.xyz;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';";

    location / {
        # Only allow traffic from Cloudflare IPs if possible, or expect tunnel delivery
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate Limiting
        limit_req zone=api burst=20 nodelay;

        # Header Validation (Example: Custom Secret)
        # if ($http_x_zayvora_origin != "tunnel-active") {
        #     return 403;
        # }
    }

    # Logging
    access_log /var/log/nginx/zayvora_access.log;
    error_log /var/log/nginx/zayvora_error.log;
}
